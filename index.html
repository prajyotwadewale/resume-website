const SENSITIVITY = 0.8;

    period:'Mar 2026 – May 2026 · Remote',
    bullets:[
      'Analyzed datasets to identify trends, patterns, and actionable insights.',

function useTypewriter(text, speed=38, startDelay=600) {
  const [displayed, setDisplayed] = useState('');
  const [done, setDone] = useState(false);
  useEffect(() => {
    setDisplayed(''); setDone(false);
    let index=0, interval;
    const timeout = setTimeout(() => {
      interval = setInterval(() => {
        index++;
        setDisplayed(text.slice(0,index));
        if (index >= text.length) { clearInterval(interval); setDone(true); }
      }, speed);
    }, startDelay);
    return () => { clearTimeout(timeout); clearInterval(interval); };
  }, [text,speed,startDelay]);
  return {displayed,done};
}

function CopyIcon() {
  return (
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
      <rect x="3.5" y="3.5" width="7" height="7" rx="1" stroke="currentColor" strokeWidth="1"/>
      <path d="M2 8.5H1.5A1 1 0 0 1 .5 7.5v-6A1 1 0 0 1 1.5.5h6A1 1 0 0 1 8.5 1.5V2" stroke="currentColor" strokeWidth="1"/>
    </svg>
  );
}

function Reveal({children, delay=0}) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    el.style.transitionDelay = delay+'ms';
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { el.classList.add('visible'); obs.unobserve(el); } });
    }, {threshold:0.1});
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return <div ref={ref} className="reveal">{children}</div>;
}

function App() {

  const [menuOpen, setMenuOpen] = useState(false);
  const [pillsVisible, setPillsVisible] = useState(false);

  const {displayed, done} = useTypewriter(
    "CS Engineer with hands-on AI internships — building LangChain workflows, backend APIs, and data-driven solutions. I lead teams and ship things. What are we solving next?",
    36, 700
  );

  useEffect(() => { const t=setTimeout(()=>setPillsVisible(true),400); return ()=>clearTimeout(t); },[]);
  useEffect(() => { const fn=()=>setIsMd(window.innerWidth>=768); window.addEventListener('resize',fn); return ()=>window.removeEventListener('resize',fn); },[]);

  useEffect(() => {
    const video=videoRef.current; if(!video) return;
    let prevX=null, targetTime=0, seeking=false;
    const seekTo=t=>{video.currentTime=t;seeking=true;};
    const onSeeked=()=>{seeking=false;if(Math.abs(video.currentTime-targetTime)>0.01)seekTo(targetTime);};
    const onMouseMove=e=>{
      if(!video.duration)return;
      const cx=e.clientX;
      if(prevX===null){prevX=cx;return;}
      const delta=cx-prevX; prevX=cx;
      targetTime=Math.min(Math.max(targetTime+(delta/window.innerWidth)*SENSITIVITY*video.duration,0),video.duration);
      if(!seeking)seekTo(targetTime);
    };
    video.addEventListener('seeked',onSeeked);
    window.addEventListener('mousemove',onMouseMove);
    return ()=>{video.removeEventListener('seeked',onSeeked);window.removeEventListener('mousemove',onMouseMove);};
  },[]);

  const handleCopy=async()=>{try{await navigator.clipboard.writeText(EMAIL);setCopied(true);setTimeout(()=>setCopied(false),1800);}catch(e){}};
  const scrollTo=href=>{const el=document.querySelector(href);if(el)el.scrollIntoView({behavior:'smooth'});setMenuOpen(false);};

  return (
    <div style={{position:'relative',width:'100%',background:'#fff',overflowX:'hidden'}}>

      {/* VIDEO */}
      <video ref={videoRef} src={VIDEO_URL} muted playsInline preload="auto"
        style={{position:'fixed',inset:0,zIndex:0,width:'100%',height:'100%',objectFit:'cover',objectPosition:'70% center'}}
      />

        <div style={{display:'flex',alignItems:'center',gap:'0.75rem'}}>
          <span style={{fontFamily:'var(--font-heading)',fontSize:isMd?'22px':'18px',letterSpacing:'-0.02em',color:'#000',lineHeight:1}}>
            Prajyot.dev
          </span>
          <span style={{fontSize:isMd?'28px':'22px',letterSpacing:'-0.02em',color:'#000',userSelect:'none',lineHeight:1}} aria-hidden="true">✳︎</span>
        </div>

        {isMd && (
          <div style={{display:'flex',alignItems:'center'}}>

                <a href={link.href} className="nav-link" onClick={e=>{e.preventDefault();scrollTo(link.href);}}>{link.label}</a>
                {i < NAV_LINKS.length-1 && <span style={{fontSize:'23px',color:'#000',marginRight:'2px'}}>,&nbsp;</span>}
              </React.Fragment>
            ))}
          </div>
        )}

        {isMd && (
          <a href="#contact" className="nav-link" style={{textDecoration:'underline',textUnderlineOffset:'2px'}}
            onClick={e=>{e.preventDefault();scrollTo('#contact');}}>
            Get in touch
          </a>
        )}

        {!isMd && (
          <button onClick={()=>setMenuOpen(v=>!v)} aria-label="Toggle menu"
            style={{display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',gap:'5px',width:'32px',height:'32px',background:'transparent',border:'none',cursor:'pointer',padding:0}}>
            <span className="ham-bar" style={{transform:menuOpen?'translateY(7px) rotate(45deg)':'none'}}/>
            <span className="ham-bar" style={{opacity:menuOpen?0:1}}/>
            <span className="ham-bar" style={{transform:menuOpen?'translateY(-7px) rotate(-45deg)':'none'}}/>
          </button>
        )}
      </nav>

      {/* MOBILE OVERLAY */}
      {!isMd && (
        <div style={{position:'fixed',inset:0,zIndex:9,background:'rgba(255,255,255,0.97)',backdropFilter:'blur(4px)',display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'flex-start',paddingLeft:'2rem',paddingRight:'2rem',gap:'2rem',opacity:menuOpen?1:0,pointerEvents:menuOpen?'auto':'none',transition:'opacity 300ms'}}>
          {NAV_LINKS.map(link=>(

        </div>
      )}

          <div style={{pointerEvents:'none',userSelect:'none',marginBottom:isMd?'1.5rem':'1.25rem',fontSize:'clamp(18px,4vw,26px)',lineHeight:1.3,fontWeight:400,color:'#000'}}>

            CSE Student | AI & Data Science Enthusiast
          </div>
